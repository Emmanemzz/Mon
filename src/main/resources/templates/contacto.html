<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <title>Mon - Contacto</title>
  </head>
  <!--TODO
    Falta agregar estilos-->
  <body>
    <!--HEADER MON-->
    <header class="container-fluid py-2">
      <div class="row align-items-center">
        <!--Logo de la página-->
        <div class="col-auto">
          <a th:href="@{/}">
            <img
              th:src="@{/images/logo/mon-logo.png}"
              alt="Logo Mon"
              height="70"
            />
          </a>
        </div>
      </div>
      <!--Barra de búsqueda recetas-->
      <div class="col">
        <form th:action="@{/recetas}" method="get">
          <input
            type="text"
            name="q"
            class="form-control"
            placeholder="Busca una receta o usuario..."
            th:value="${q}"
          />
        </form>
      </div>
      <!--Botones de login y registro-->
      <div class="col-auto">
        <a th:href="@{/login}" class="button button-outline-secondary me-2"
          >Iniciar sesión</a
        >
        <a th:href="@{/registro}" class="button button-outline-secondary"
          >Registro</a
        >
      </div>
      <!--Botón de cerrar sesión-->
      <div th:if="${#authorization.expression('isAuthenticated()')}">
        <form th:action="@{/logout}" method="post" class="d-inline">
          <button type="submit" class="btn btn-outline-secondary">
            Cerrar sesión
          </button>
        </form>
      </div>
    </header>
    <!--Fin del header-->

    <!--Menú de navegación-->
    <nav class="container-fluid">
      <div class="row text-center">
        <div class="col">
          <a th:href="@{/}" class="text-decoration-none">Inicio</a>
        </div>
        <div class="col">
          <a th:href="@{/recetas}" class="text-decoration-none">Recetas</a>
        </div>
        <div class="col">
          <a th:href="@{/perfil}" class="text-decoration-none">Perfil</a>
        </div>
        <div class="col">
          <a th:href="@{/contacto}" class="text-decoration-none">Contacto</a>
        </div>
      </div>
    </nav>
    <!--Fin menú de navegación-->

    <!--Formulario de contacto-->
    <section class="container my-4">
      <div class="row justify-content-center">
        <div class="col-md-7">
          <h2 class="mb-1">Contacto</h2>
          <p class="text-muted mb-4">
            ¿Tienes alguna sugerencia o problema? Escríbenos.
          </p>

          <!--Mensaje de confirmación-->
          <div
            th:if="${exito}"
            class="alert alert-success"
            th:text="${exito}"
          ></div>

          <form th:action="@{/contacto}" method="post">
            <input
              type="hidden"
              th:name="${_csrf.parameterName}"
              th:value="${_csrf.token}"
            />

            <div class="mb-3">
              <label for="nombre" class="form-label">Nombre</label>
              <input
                type="text"
                id="nombre"
                name="nombre"
                class="form-control"
                placeholder="Tu nombre"
                required
              />
            </div>

            <div class="mb-3">
              <label for="email" class="form-label">Correo electrónico</label>
              <input
                type="email"
                id="email"
                name="email"
                class="form-control"
                placeholder="tu@email.com"
                required
              />
            </div>

            <div class="mb-3">
              <label for="asunto" class="form-label">Asunto</label>
              <select id="asunto" name="asunto" class="form-select" required>
                <option value="" disabled selected>Selecciona un asunto</option>
                <option value="sugerencia">Sugerencia</option>
                <option value="problema">Problema técnico</option>
                <option value="otro">Otro</option>
              </select>
            </div>

            <div class="mb-3">
              <label for="mensaje" class="form-label">Mensaje</label>
              <textarea
                id="mensaje"
                name="mensaje"
                class="form-control"
                rows="5"
                placeholder="Escribe tu mensaje aquí..."
                required
              ></textarea>
            </div>

            <button type="submit" class="btn btn-success w-100">
              Enviar mensaje
            </button>
          </form>
        </div>
      </div>
    </section>
    <!--Fin formulario de contacto-->

    <!--Footer-->
    <footer class="container-fluid text-center mt-4 py-4 border">
      <div>
        <a th:href="@{/}">
          <img
            th:src="@{/images/logo/mon-logo.png}"
            alt="Logo Mon"
            height="70"
          />
        </a>
      </div>
      <div class="mt-2">
        <a th:href="@{https://www.instagram.com/}" target="_blank">
          <img
            th:src="@{/images/iconos/rrss/instagram.png}"
            alt="Logo Instagram"
            height="30"
          />
        </a>
        <a th:href="@{https://x.com/?lang=es}" target="_blank">
          <img th:src="@{/images/iconos/rrss/x.png}" alt="Logo X" height="30" />
        </a>
        <a th:href="@{https://www.tiktok.com/es-419/}" target="_blank">
          <img
            th:src="@{/images/iconos/rrss/tiktok.png}"
            alt="Logo TikTok"
            height="30"
          />
        </a>
        <a th:href="@{https://www.youtube.com/}" target="_blank">
          <img
            th:src="@{/images/iconos/rrss/youtube.png}"
            alt="Logo Youtube"
            height="30"
          />
        </a>
      </div>
    </footer>
    <!--Fin del footer-->
  </body>
</html>
