<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!--Font Lato-->
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/mon.css}" />
    <link rel="stylesheet" th:href="@{/css/registro.css}">
    <title>Mon - Registro</title>
  </head>
  <body>
    <!--HEADER MON-->
    <header class="container-fluid py-2">
      <div class="row align-items-center">
        <!-- Logo Mon-->
        <div class="col-auto">
          <a th:href="@{/}">
            <img
              th:src="@{/images/logo/mon-logo.png}"
              alt="Logo Mon"
              height="70"
            />
          </a>
        </div>

        <!-- Barra de búsqueda de recetas o usuarios-->
        <div class="col">
          <form th:action="@{/recetas}" method="get">
            <input
              type="text"
              name="q"
              class="form-control"
              placeholder="Busca una receta o usuario..."
              th:value="${q}"
            />
          </form>
        </div>

        <!-- Botone -->
        <div class="col-auto">
          <th:block th:if="${#authorization.expression('isAnonymous()')}">
            <!--Button iniciar sesión-->
            <a th:href="@{/login}" class="btn btn-outline-secondary me-2"
              >Iniciar sesión</a
            >
            <!--Butto registro-->
            <a th:href="@{/registro}" class="btn btn-outline-secondary"
              >Registro</a
            >
          </th:block>
          <th:block th:if="${#authorization.expression('isAuthenticated()')}">
            <form th:action="@{/logout}" method="post" class="d-inline">
              <button type="submit" class="btn btn-outline-secondary">
                Cerrar sesión
              </button>
            </form>
          </th:block>
        </div>
      </div>
    </header>
    <!--Fin del header-->

    <!--Menú de navegación-->
    <nav class="navbar navbar-expand-lg">
      <div class="container-fluid">
        <!-- Botón hamburguesa para móvil -->
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#menuPrincipal"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Links de navegación -->
        <div class="collapse navbar-collapse" id="menuPrincipal">
          <ul class="navbar-nav mx-auto">
            <li class="nav-item">
              <a th:href="@{/}" class="nav-link">Inicio</a>
            </li>
            <li class="nav-item">
              <a th:href="@{/recetas}" class="nav-link">Recetas</a>
            </li>
            <li class="nav-item">
              <a th:href="@{/perfil}" class="nav-link">Perfil</a>
            </li>
            <li class="nav-item">
              <a th:href="@{/contacto}" class="nav-link">Contacto</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <!--Fin menú de navegación-->

    <!--Formulario de registro-->
    <section class="container my-5">
      <div class="row justify-content-center">
        <div class="col-md-8 border rounded p-4 registro-card">
          <div class="row">
            <!--Formulario-->
            <div class="col-md-6 border-end">
              <h2>¡Regístrate!</h2>
              <h6 class="text-muted mb-4">Y comparte tus recetas &#x1F600;</h6>

              <p th:if="${error}" th:text="${error}" class="text-danger"></p>

              <form
                th:action="@{/registro}"
                th:object="${usuario}"
                method="post"
              >
                <div class="mb-3">
                  <label class="form-label">Nombre</label>
                  <input
                    type="text"
                    th:field="*{nombre}"
                    class="form-control"
                    placeholder="Teresa"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label class="form-label">Email</label>
                  <input
                    type="email"
                    th:field="*{email}"
                    class="form-control"
                    placeholder="email@ejemplo.com"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label class="form-label">Contraseña</label>
                  <input
                    type="password"
                    th:field="*{password}"
                    class="form-control"
                    placeholder="••••••••"
                    required
                  />
                </div>
                <button type="submit" class="btn btn-registro w-100">
                  Crear cuenta
                </button>
              </form>

              <p class="mt-3 text-center registro-link">
                ¿Ya tienes cuenta?
                <strong><a th:href="@{/login}">Inicia sesión</a></strong>
              </p>
            </div>

            <!--Imagen-->
            <div
              class="col-md-6 d-flex align-items-center justify-content-center"
            >
              <img
                th:src="@{/images/registro.png}"
                alt="Imagen registro"
                class="img-fluid"
              />
            </div>
          </div>
        </div>
      </div>
    </section>

    <!--Footer-->
    <footer class="container-fluid text-center mt-4 py-4 border">
      <div>
        <a th:href="@{/}">
          <img
            th:src="@{/images/logo/mon-logo-sinfondo.png}"
            alt="Logo Mon"
            height="70"
          />
        </a>
      </div>
      <div class="mt-2">
        <a th:href="@{https://www.instagram.com/}" target="_blank">
          <img
            th:src="@{/images/iconos/rrss/instagram.png}"
            alt="Logo Instagram"
            height="30"
          />
        </a>
        <a th:href="@{https://x.com/?lang=es}" target="_blank">
          <img th:src="@{/images/iconos/rrss/x.png}" alt="Logo X" height="30" />
        </a>
        <a th:href="@{https://www.tiktok.com/es-419/}" target="_blank">
          <img
            th:src="@{/images/iconos/rrss/tiktok.png}"
            alt="Logo TikTok"
            height="30"
          />
        </a>
        <a th:href="@{https://www.youtube.com/}" target="_blank">
          <img
            th:src="@{/images/iconos/rrss/youtube.png}"
            alt="Logo Youtube"
            height="30"
          />
        </a>
      </div>
    </footer>
    <!--Fin del footer-->
  </body>
</html>
