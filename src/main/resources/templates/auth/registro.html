<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <title>Mon - Login</title>
  </head>
  <body>
    <!--HEADER MON-->
    <header class="container-fluid py-2">
      <div class="row align-items-center">
        <!--Logo de la página-->
        <div class="col-auto">
          <a th:href="@{/}">
            <img
              th:src="@{/images/logo/mon-logo.png}"
              alt="Logo Mon"
              height="70"
            />
          </a>
        </div>
      </div>
      <!--Barra de búsqueda recetas-->
      <div class="col">
        <form th:action="@{/recetas/buscar}" method="get">
          <input
            type="text"
            name="ingrediente"
            class="form-control"
            placeholder="Busca una receta..."
          />
        </form>
      </div>
      <!--Botones de login y registro-->
      <div class="col-auto">
        <a th:href="@{/login}" class="button button-outline-secondary me-2"
          >Iniciar sesión</a
        >
        <a th:href="@{/registro}" class="button button-outline-secondary"
          >Registro</a
        >
      </div>
    </header>
    <!--Fin del header-->

    <!--Menú de navegación-->
    <nav class="container-fluid">
      <div class="row text-center">
        <div class="col">
          <a th:href="@{/}" class="text-decoration-none">Inicio</a>
        </div>
        <div class="col">
          <a th:href="@{/recetas}" class="text-decoration-none">Recetas</a>
        </div>
        <div class="col">
          <a th:href="@{/perfil}" class="text-decoration-none">Perfil</a>
        </div>
        <div class="col">
          <a th:href="@{/contacto}" class="text-decoration-none">Contacto</a>
        </div>
      </div>
    </nav>
    <!--Fin menú de navegación-->

    <!--Formulario de registro-->
    <section class="container my-4">
      <div class="row justify-content-center">
        <div class="col-md-8 border rounded p-4">
          <div class="row">
            <!--Formulario-->
            <div class="col-md-6">
              <h2>¡Regístrate!</h2>
              <h6 class="text-muted mb-4">Y comparte tus recetas &#x1F600;</h6>

              <p th:if="${error}" th:text="${error}" class="text-danger"></p>

              <form
                th:action="@{/registro}"
                th:object="${usuario}"
                method="post"
              >
                <div class="mb-3">
                  <label class="form-label">Nombre</label>
                  <input
                    type="text"
                    th:field="*{nombre}"
                    class="form-control"
                    placeholder="Teresa"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label class="form-label">Email</label>
                  <input
                    type="email"
                    th:field="*{email}"
                    class="form-control"
                    placeholder="email@ejemplo.com"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label class="form-label">Contraseña</label>
                  <input
                    type="password"
                    th:field="*{password}"
                    class="form-control"
                    placeholder="••••••••"
                    required
                  />
                </div>
                <button type="submit" class="btn btn-dark w-100">
                  Crear cuenta
                </button>
              </form>

              <p class="mt-3 text-center">
                ¿Ya tienes cuenta?
                <strong><a th:href="@{/login}">Inicia sesión</a></strong>
              </p>
            </div>

            <!--Imagen-->
            <div
              class="col-md-6 d-flex align-items-center justify-content-center"
            >
              <img
                th:src="@{/images/registro.png}"
                alt="Imagen registro"
                class="img-fluid"
              />
            </div>
          </div>
        </div>
      </div>
    </section>

    <!--Footer-->
    <footer class="container-fluid text-center mt-4 py-4 border">
      <div>
        <a th:href="@{/}">
          <img
            th:src="@{/images/logo/mon-logo.png}"
            alt="Logo Mon"
            height="70"
          />
        </a>
      </div>
      <div class="mt-2">
        <a th:href="@{https://www.instagram.com/}" target="_blank">
          <img
            th:src="@{/images/iconos/rrss/instagram.png}"
            alt="Logo Instagram"
            height="30"
          />
        </a>
        <a th:href="@{https://x.com/?lang=es}" target="_blank">
          <img th:src="@{/images/iconos/rrss/x.png}" alt="Logo X" height="30" />
        </a>
        <a th:href="@{https://www.tiktok.com/es-419/}" target="_blank">
          <img
            th:src="@{/images/iconos/rrss/tiktok.png}"
            alt="Logo TikTok"
            height="30"
          />
        </a>
        <a th:href="@{https://www.youtube.com/}" target="_blank">
          <img
            th:src="@{/images/iconos/rrss/youtube.png}"
            alt="Logo Youtube"
            height="30"
          />
        </a>
      </div>
    </footer>
    <!--Fin del footer-->
  </body>
</html>
