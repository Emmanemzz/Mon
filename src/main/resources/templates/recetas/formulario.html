<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!--Font Lato-->
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/mon.css}" />
    <title>Mon - Formulario Receta</title>
  </head>
  <body>
   <!--HEADER MON-->
    <header class="container-fluid py-2">
      <div class="row align-items-center">
        <!-- Logo Mon-->
        <div class="col-auto">
          <a th:href="@{/}">
            <img
              th:src="@{/images/logo/mon-logo.png}"
              alt="Logo Mon"
              height="70"
            />
          </a>
        </div>

        <!-- Barra de búsqueda de recetas o usuarios-->
        <div class="col">
          <form th:action="@{/recetas}" method="get">
            <input
              type="text"
              name="q"
              class="form-control"
              placeholder="Busca una receta o usuario..."
              th:value="${q}"
            />
          </form>
        </div>

        <!-- Botone -->
        <div class="col-auto">
          <th:block th:if="${#authorization.expression('isAnonymous()')}">
            <!--Button iniciar sesión-->
            <a th:href="@{/login}" class="btn btn-outline-secondary me-2"
              >Iniciar sesión</a
            >
            <!--Butto registro-->
            <a th:href="@{/registro}" class="btn btn-outline-secondary"
              >Registro</a
            >
          </th:block>
          <th:block th:if="${#authorization.expression('isAuthenticated()')}">
            <form th:action="@{/logout}" method="post" class="d-inline">
              <button type="submit" class="btn btn-outline-secondary">
                Cerrar sesión
              </button>
            </form>
          </th:block>
        </div>
      </div>
    </header>
    <!--Fin del header-->

    <!--Menú de navegación-->
    <nav class="navbar navbar-expand-lg">
      <div class="container-fluid">
        <!-- Botón hamburguesa para móvil -->
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#menuPrincipal"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Links de navegación -->
        <div class="collapse navbar-collapse" id="menuPrincipal">
          <ul class="navbar-nav mx-auto">
            <li class="nav-item">
              <a th:href="@{/}" class="nav-link">Inicio</a>
            </li>
            <li class="nav-item">
              <a th:href="@{/recetas}" class="nav-link">Recetas</a>
            </li>
            <li class="nav-item">
              <a th:href="@{/perfil}" class="nav-link">Perfil</a>
            </li>
            <li class="nav-item">
              <a th:href="@{/contacto}" class="nav-link">Contacto</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <!--Fin menú de navegación-->

    <!--Contenido del formulario-->
    <div class="container my-4">
      <!--Encabezado del formulario-->
      <h2
        class="text-center"
        th:text="${receta.id == null} ? 'Crear receta' : 'Editar receta'"
      >
        Crear receta
      </h2>

      <form
        th:action="${receta.id == null} ? @{/recetas/nueva} : @{/recetas/{id}/editar(id=${receta.id})}"
        th:object="${receta}"
        method="post"
      >
        <!--Título receta-->
        <div class="mb-4 text-center">
          <input
            type="text"
            th:field="*{titulo}"
            placeholder="Introduzca un título de receta"
            class="form-control text-center"
          />
        </div>

        <div class="row">
          <!--Ingredientes-->
          <div class="col-md-4">
            <textarea
              th:field="*{ingredientes}"
              rows="5"
              placeholder="Escribe un ingrediente por línea"
              class="form-control"
            >
            </textarea>
          </div>
          <!--Dificultad, tiempo, imágenes-->
          <div class="col-md-8">
            <div class="input-group mb-2">
              <span class="input-group-text">Tiempo de preparación</span>
              <input
                type="text"
                th:field="*{tiempoPreparacion}"
                placeholder="Introduce tiempo de preparación"
                class="form-control"
              />
            </div>

            <div class="input-group mb-3">
              <span class="input-group-text">Dificultad</span>
              <input
                type="text"
                th:field="*{dificultad}"
                placeholder="Introduce la dificultad"
                class="form-control"
              />
            </div>

            <div class="row">
              <div class="col-md-6">
                <div class="border p-3 text-center">
                  <p class="text-muted mb-1">Imagen 1</p>
                  <input
                    type="text"
                    th:field="*{imagen1}"
                    placeholder="Pega aquí la URL https://..."
                    class="form-control"
                  />
                </div>
              </div>
              <div class="col-md-6">
                <div class="border p-3 text-center">
                  <p class="text-muted mb-1">Imagen 2</p>
                  <input
                    type="text"
                    th:field="*{imagen2}"
                    placeholder="Pega aquí la URL https://..."
                    class="form-control"
                  />
                </div>
              </div>
            </div>
          </div>
        </div>

        <!--Preparación-->
        <div class="mt-4">
          <div class="border p-3">
            <h6>Método de preparación</h6>
            <textarea
              th:field="*{metodoPreparacion}"
              rows="6"
              placeholder="Escribe aquí los pasos de tu deliciosa receta &#128512;"
              class="form-control border-0"
            ></textarea>
          </div>
        </div>

        <!--EXTRA ETIQUETAS-->
        <div class="row mt-3">
          <!--Tipo de cocina-->
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Tipo de cocina</label>
            <div
              th:each="opcion : ${ {'Mediterránea', 'Oriental', 'Latinoamericana', 'Nórdica'} }"
            >
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="radio"
                  th:name="pais"
                  th:value="${opcion}"
                  th:id="'cocina-' + ${opcion}"
                  th:checked="${receta.pais == opcion}"
                />
                <label
                  class="form-check-label"
                  th:for="'cocina-' + ${opcion}"
                  th:text="${opcion}"
                ></label>
              </div>
            </div>
          </div>

          <!--Tipo de dieta-->
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Tipo de dieta</label>
            <div
              th:each="opcion : ${ {'Vegana', 'Vegetariana', 'Flexitariana'} }"
            >
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="radio"
                  th:name="tipoDieta"
                  th:value="${opcion}"
                  th:id="'dieta-' + ${opcion}"
                  th:checked="${receta.tipoDieta == opcion}"
                />
                <label
                  class="form-check-label"
                  th:for="'dieta-' + ${opcion}"
                  th:text="${opcion}"
                ></label>
              </div>
            </div>
          </div>

          <!--Intolerancias/alergias-->
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Intolerancias/alergias</label>
            <div
              th:each="opcion : ${ {'Sin gluten', 'Lácteos', 'Frutos secos', 'Huevo'} }"
            >
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="radio"
                  th:name="alergias"
                  th:value="${opcion}"
                  th:id="'alergia-' + ${opcion}"
                  th:checked="${receta.alergias == opcion}"
                />
                <label
                  class="form-check-label"
                  th:for="'alergia-' + ${opcion}"
                  th:text="${opcion}"
                ></label>
              </div>
            </div>
          </div>

          <!--Tipo de plato-->
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Tipo de plato</label>
            <div
              th:each="opcion : ${ {'Entrante', 'Principal', 'Postre', 'Bebida'} }"
            >
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="radio"
                  th:name="tipoPlato"
                  th:value="${opcion}"
                  th:id="'plato-' + ${opcion}"
                  th:checked="${receta.tipoPlato == opcion}"
                />
                <label
                  class="form-check-label"
                  th:for="'plato-' + ${opcion}"
                  th:text="${opcion}"
                ></label>
              </div>
            </div>
          </div>
        </div>
        <!--Fin extra etiquetas-->

        <div class="text-center mt-4">
          <button type="submit" class="btn btn-outline-secondary px-5">
            Guardar receta
          </button>
          <a th:href="@{/recetas}" class="btn btn-outline-danger px-5"
            >Cancelar</a
          >
        </div>
      </form>
    </div>

    <!--Footer-->
    <footer class="container-fluid text-center mt-4 py-4 border">
      <div>
        <a th:href="@{/}">
          <img
            th:src="@{/images/logo/mon-logo-sinfondo.png}"
            alt="Logo Mon"
            height="70"
          />
        </a>
      </div>
      <div class="mt-2">
        <a th:href="@{https://www.instagram.com/}" target="_blank">
          <img
            th:src="@{/images/iconos/rrss/instagram.png}"
            alt="Logo Instagram"
            height="30"
          />
        </a>
        <a th:href="@{https://x.com/?lang=es}" target="_blank">
          <img th:src="@{/images/iconos/rrss/x.png}" alt="Logo X" height="30" />
        </a>
        <a th:href="@{https://www.tiktok.com/es-419/}" target="_blank">
          <img
            th:src="@{/images/iconos/rrss/tiktok.png}"
            alt="Logo TikTok"
            height="30"
          />
        </a>
        <a th:href="@{https://www.youtube.com/}" target="_blank">
          <img
            th:src="@{/images/iconos/rrss/youtube.png}"
            alt="Logo Youtube"
            height="30"
          />
        </a>
      </div>
    </footer>
    <!--Fin del footer-->
  </body>
</html>
