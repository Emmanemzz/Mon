<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <title>Mon - Home</title>
  </head>
  <!--TODO
    Falta agregar estilos-->
  <body>
    <!--HEADER MON-->
    <header class="container-fluid py-2">
      <div class="row align-items-center">
        <!--Logo de la página-->
        <div class="col-auto">
          <a th:href="@{/}">
            <img
              th:src="@{/images/logo/mon-logo.png}"
              alt="Logo Mon"
              height="70"
            />
          </a>
        </div>
      </div>
      <!--Barra de búsqueda recetas-->
      <div class="col">
        <form th:action="@{/recetas}" method="get">
          <input
            type="text"
            name="q"
            class="form-control"
            placeholder="Busca una receta..."
          />
        </form>
      </div>
      <!--Botones de login y registro-->
      <div class="col-auto">
        <a th:href="@{/login}" class="button button-outline-secondary me-2"
          >Iniciar sesión</a
        >
        <a th:href="@{/registro}" class="button button-outline-secondary"
          >Registro</a
        >
      </div>
      <!--Botón de cerrar sesión-->
      <div th:if="${#authorization.expression('isAuthenticated()')}">
        <form th:action="@{/logout}" method="post" class="d-inline">
          <button type="submit" class="btn btn-outline-secondary">
            Cerrar sesión
          </button>
        </form>
      </div>
    </header>
    <!--Fin del header-->

    <!--Menú de navegación-->
    <nav class="container-fluid">
      <div class="row text-center">
        <div class="col">
          <a th:href="@{/}" class="text-decoration-none">Inicio</a>
        </div>
        <div class="col">
          <a th:href="@{/recetas}" class="text-decoration-none">Recetas</a>
        </div>
        <div class="col">
          <a th:href="@{/perfil}" class="text-decoration-none">Perfil</a>
        </div>
        <div class="col">
          <a th:href="@{/contacto}" class="text-decoration-none">Contacto</a>
        </div>
      </div>
    </nav>
    <!--Fin menú de navegación-->

    <!--Recetas destacadas-->
    <section class="container my-4">
      <div class="row">
        <div th:each="receta : ${destacadas}" class="col-md-4">
          <div class="card">
            <img
              th:src="${receta.imagen1}"
              alt="Imagen receta"
              class="card-img-top"
            />
            <div class="card-body">
              <p class="card-title fw-bold" th:text="${receta.titulo}">
                Título
              </p>
              <a
                th:href="@{/recetas/{id}(id=${receta.id})}"
                class="btn btn-sm btn-outline-secondary"
              >
                Ver receta
              </a>
            </div>
          </div>
        </div>
        <p th:if="${#lists.isEmpty(destacadas)}" class="text-center text-muted">
          No hay recetas destacadas todavía.
        </p>
      </div>
    </section>
    <!--Fin sección recetas destacadas-->

    <!--Categorías destacadas-->
    <section class="container my-4">
      <h2 class="text-center">Categorías destacadas</h2>
      <div class="row mt-3">
        <div class="col-md-4">
          <div class="border tex-center py-3">
            <span>Texto de prueba</span>
          </div>
        </div>

        <div class="col-md-4">
          <div class="border tex-center py-3">
            <span>Texto de prueba 2</span>
          </div>
        </div>

        <div class="col-md-4">
          <div class="border tex-center py-3">
            <span>Texto de prueba 3</span>
          </div>
        </div>
      </div>
    </section>
    <!--Fin sección categorías destacadas-->

    <!--Recetas favoritas-->
    <section
      class="container my-4"
      th:if="${#authorization.expression('isAuthenticated()')}"
    >
      <h2 class="text-center">Recetas favoritas</h2>
      <div class="row mt-3">
        <div th:each="receta : ${recetasGuardadas}" class="col-md-6">
          <div class="card">
            <img
              th:src="${receta.imagen1}"
              alt="Imagen receta"
              class="card-img-top"
            />
            <div class="card-body">
              <p class="card-title fw-bold" th:text="${receta.titulo}">
                Nombre receta
              </p>
              <a
                th:href="@{/recetas/{id}(id=${receta.id})}"
                class="btn btn-sm btn-outline-secondary"
              >
                Ver receta
              </a>
            </div>
          </div>
        </div>
        <p
          th:if="${#lists.isEmpty(recetasGuardadas)}"
          class="text-center text-muted"
        >
          Todavía no has guardado ninguna receta.
        </p>
      </div>
    </section>
    <!--Fin sección recetas favoritas-->
    <!--Footer-->
    <footer class="container-fluid text-center mt-4 py-4 border">
      <div>
        <a th:href="@{/}">
          <img
            th:src="@{/images/logo/mon-logo.png}"
            alt="Logo Mon"
            height="70"
          />
        </a>
      </div>
      <div class="mt-2">
        <a th:href="@{https://www.instagram.com/}" target="_blank">
          <img
            th:src="@{/images/iconos/rrss/instagram.png}"
            alt="Logo Instagram"
            height="30"
          />
        </a>
        <a th:href="@{https://x.com/?lang=es}" target="_blank">
          <img th:src="@{/images/iconos/rrss/x.png}" alt="Logo X" height="30" />
        </a>
        <a th:href="@{https://www.tiktok.com/es-419/}" target="_blank">
          <img
            th:src="@{/images/iconos/rrss/tiktok.png}"
            alt="Logo TikTok"
            height="30"
          />
        </a>
        <a th:href="@{https://www.youtube.com/}" target="_blank">
          <img
            th:src="@{/images/iconos/rrss/youtube.png}"
            alt="Logo Youtube"
            height="30"
          />
        </a>
      </div>
    </footer>
    <!--Fin del footer-->
  </body>
</html>
