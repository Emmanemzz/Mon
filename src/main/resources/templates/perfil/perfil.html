<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <title>Mon - Perfil</title>
  </head>
  <!--TODO
    Falta agregar estilos-->
  <body>
    <!--HEADER MON-->
    <header class="container-fluid py-2">
      <div class="row align-items-center">
        <!--Logo de la página-->
        <div class="col-auto">
          <a th:href="@{/}">
            <img
              th:src="@{/images/logo/mon-logo.png}"
              alt="Logo Mon"
              height="70"
            />
          </a>
        </div>
      </div>
      <!--Barra de búsqueda recetas-->
      <div class="col">
        <form th:action="@{/buscar}" method="get">
          <input
            type="text"
            name="q"
            class="form-control"
            placeholder="Busca una receta..."
          />
        </form>
      </div>
      <!--Botones de login y registro-->
      <div class="col-auto">
        <a th:href="@{/login}" class="button button-outline-secondary me-2"
          >Iniciar sesión</a
        >
        <a th:href="@{/registro}" class="button button-outline-secondary"
          >Registro</a
        >
      </div>
      <!--Botones de login y registro-->
      <div class="col-auto">
        <div th:if="${#authorization.expression('isAnonymous()')}">
          <a th:href="@{/login}" class="button button-outline-secondary me-2"
            >Iniciar sesión</a
          >
          <a th:href="@{/registro}" class="button button-outline-secondary"
            >Registro</a
          >
        </div>
        <!--Botón de cerrar sesión-->
        <div th:if="${#authorization.expression('isAuthenticated()')}">
          <form th:action="@{/logout}" method="post" class="d-inline">
            <button type="submit" class="btn btn-outline-secondary">
              Cerrar sesión
            </button>
          </form>
        </div>
      </div>
    </header>
    <!--Fin del header-->

    <!--Menú de navegación-->
    <nav class="container-fluid">
      <div class="row text-center">
        <div class="col">
          <a th:href="@{/}" class="text-decoration-none">Inicio</a>
        </div>
        <div class="col">
          <a th:href="@{/recetas}" class="text-decoration-none">Recetas</a>
        </div>
        <div class="col">
          <a th:href="@{/perfil}" class="text-decoration-none">Perfil</a>
        </div>
        <div class="col">
          <a th:href="@{/contacto}" class="text-decoration-none">Contacto</a>
        </div>
      </div>
    </nav>
    <!--Fin menú de navegación-->

    <!--Perfil de usuario-->
    <section class="container my-4">
      <div class="row">
        <!--imagen y biografía-->
        <div class="col-md-3 text-center">
          <img
            th:src="${usuario.imagenPerfil != null} ? ${usuario.imagenPerfil} : @{/images/default-avatar.png}"
            alt="Foto de perfil"
            class="img-fluid rounded-circle mb-3"
            style="max-width: 150px"
          />
          <h2 th:text="${usuario.nombre}">Nombre</h2>
          <p th:text="${usuario.biografia}" class="text-muted">Biografia</p>
          <a
            th:if="${usuario.id == usuarioActual?.id}"
            th:href="@{/perfil/editar}"
            class="btn btn-outline-secondary"
            >Editar perfil</a
          >
        </div>

        <!--Recetas propias del usuario-->
        <div class="col-md-9">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="mb-0">Mis recetas</h3>
            <div
              th:if="${usuario.id == usuarioActual?.id}"
              class="d-flex gap-2"
            >
              <a
                th:href="@{/perfil/mis-recetas}"
                class="btn btn-outline-danger btn-sm"
                >Eliminar receta</a
              >
              <a th:href="@{/recetas/nueva}" class="btn btn-success"
                >+ Nueva receta</a
              >
            </div>
          </div>
          <div class="row">
            <div class="col-md-4 mb-3" th:each="receta : ${recetas}">
              <div class="card h-100">
                <div class="card-body">
                  <h5 class="card-title">
                    <a
                      th:href="@{/recetas/{id}(id=${receta.id})}"
                      th:text="${receta.titulo}"
                      class="text-decoration-none"
                      >Título</a
                    >
                  </h5>
                  <p class="card-text text-muted" th:text="${receta.pais}">
                    País
                  </p>
                </div>
              </div>
            </div>
          </div>
          <p th:if="${#lists.isEmpty(recetas)}" class="text-muted">
            Aún no has creado ninguna receta.
          </p>
          <!--Fin recetas propias-->

          <!--Recetas guardadas de otros usuarios-->
          <div th:if="${usuario.id == usuarioActual?.id}">
            <div
              class="d-flex justify-content-between align-items-center mt-4 mb-3"
            >
              <h3 class="mb-0">Recetas guardadas</h3>
              <a
                th:href="@{/perfil/recetas-guardadas}"
                class="btn btn-outline-danger btn-sm"
                >Quitar guardadas</a
              >
            </div>
            <div class="row">
              <div class="col-md-4 mb-3" th:each="receta : ${recetasGuardadas}">
                <div class="card h-100">
                  <div class="card-body">
                    <h5 class="card-title">
                      <a
                        th:href="@{/recetas/{id}(id=${receta.id})}"
                        th:text="${receta.titulo}"
                        class="text-decoration-none"
                        >Título</a
                      >
                    </h5>
                    <p class="card-text text-muted" th:text="${receta.pais}">
                      País
                    </p>
                  </div>
                </div>
              </div>
            </div>
            <p th:if="${#lists.isEmpty(recetasGuardadas)}" class="text-muted">
              No tienes recetas guardadas.
            </p>
          </div>
        </div>
      </div>
    </section>
    <!--Fin recetas guardadas de otros usuarios-->

    <!--Footer-->
    <footer class="container-fluid text-center mt-4 py-4 border">
      <div>
        <a th:href="@{/}">
          <img
            th:src="@{/images/logo/mon-logo.png}"
            alt="Logo Mon"
            height="70"
          />
        </a>
      </div>
      <div class="mt-2">
        <a th:href="@{https://www.instagram.com/}" target="_blank">
          <img
            th:src="@{/images/iconos/rrss/instagram.png}"
            alt="Logo Instagram"
            height="30"
          />
        </a>
        <a th:href="@{https://x.com/?lang=es}" target="_blank">
          <img th:src="@{/images/iconos/rrss/x.png}" alt="Logo X" height="30" />
        </a>
        <a th:href="@{https://www.tiktok.com/es-419/}" target="_blank">
          <img
            th:src="@{/images/iconos/rrss/tiktok.png}"
            alt="Logo TikTok"
            height="30"
          />
        </a>
        <a th:href="@{https://www.youtube.com/}" target="_blank">
          <img
            th:src="@{/images/iconos/rrss/youtube.png}"
            alt="Logo Youtube"
            height="30"
          />
        </a>
      </div>
    </footer>
    <!--Fin del footer-->
  </body>
</html>
